<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#FF6B81">

    <title>Foodie Login</title>

    <!-- CSS FILE -->

    <link rel="stylesheet" href="auth.css">

    <!-- GOOGLE FONT -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- WEBSITE ICON -->

    <link rel="icon" href="images/3B_Logo.png">

</head>
<script src="login.js"></script>

<body>
    <!-- MAIN CONTAINER -->

    <div class="container">

        <!-- RIGHT LOGIN FORM -->

        <div class="form-section">

            <div class="form-box">

                <!-- LOGO -->

                <div class="logo">
                <img src="images/3B_Logo.png" alt="logo">
                </div>

                <!-- HEADING -->

                <h2>Welcome Back</h2>

                <p>Login to continue ordering delicious food</p>

                <!-- FORM -->

                <form>

                    <!-- EMAIL -->

                    <div class="input-box">

                        <label>Email</label>

                        <input 
                        type="email"
                        placeholder="Enter your email"
                        autocomplete="email"
                        required>

                    </div>

                    <!-- PASSWORD -->

                    <div class="input-box">

                        <label>Password</label>

                        <div class="password-field">

                            <input 
                            type="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required>

                            <span>👁</span>

                        </div>

                    </div>

                    <!-- REMEMBER -->

                    <div class="remember">

                        <input type="checkbox">

                        <span>Remember me</span>

                    </div>

                    <!-- FORGOT PASSWORD -->

                    <div class="forgot">

                        <a href="#">Forgot Password?</a>

                    </div>

                    <!-- LOGIN BUTTON -->

                    <button type="submit">

                        Login

                    </button>

                    <!-- GOOGLE BUTTON -->

                    <div class="social-login">

                        <button type="button" class="google-btn">

                            Login with Google

                        </button>

                    </div>

                    <!-- BOTTOM TEXT -->

                    <div class="bottom-text">

                        Don't have an account?

                        <a href="signup.html">

                            Create Account

                        </a>
    

                    </div>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
